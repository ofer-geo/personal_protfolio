<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="13.5"/>
    </clipPath>
  </defs>
  <!-- Globe body -->
  <circle cx="16" cy="16" r="13.5" fill="#3D5E35"/>
  <!-- Grid lines clipped to globe -->
  <g clip-path="url(#c)" stroke="#ffffff" stroke-width="0.9" fill="none" opacity="0.6">
    <!-- Latitude lines -->
    <line x1="2" y1="9.5"  x2="30" y2="9.5"/>
    <line x1="2" y1="16"   x2="30" y2="16"/>
    <line x1="2" y1="22.5" x2="30" y2="22.5"/>
    <!-- Longitude meridians -->
    <ellipse cx="16" cy="16" rx="4.5" ry="13.5"/>
    <ellipse cx="16" cy="16" rx="9"   ry="13.5"/>
  </g>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
</svg>
